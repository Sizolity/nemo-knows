{{define "build"}}
{{template "layout-start" .}}
<section class="hero">
  <p class="eyebrow">构建</p>
  <h1>知识库维护</h1>
  <p>上传或粘贴 Markdown，系统会校验后入库，并使用默认 Stable 配置启动编译。</p>
</section>

{{if .Error}}
  <div class="notice notice-error">
    <p>
      <strong>保存失败：</strong>{{.Error}}
    </p>
  </div>
{{end}}

{{if .Success}}
  <div class="notice notice-success">
    <p>
      <strong>导入成功：</strong>{{.Success}}
    </p>
  </div>
{{end}}

<section class="card">
  <h2>添加 Markdown</h2>

  <form method="POST" action="/build" enctype="multipart/form-data">
    <input type="hidden" name="action" value="save_source">
    <label>
      <span>上传 .md 文件</span>
      <input type="file" name="file" accept=".md,text/markdown,text/plain">
    </label>
    <label>
      <span>或粘贴 Markdown</span>
      <textarea name="content" placeholder="# Title&#10;&#10;Markdown 内容"></textarea>
    </label>
    <button type="submit">保存并启动</button>
  </form>
</section>
{{template "layout-end" .}}
{{end}}
